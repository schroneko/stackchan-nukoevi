name: NukoeviBridge
options:
  minimumXcodeGenVersion: 2.43.0
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
targets:
  NukoeviBridge:
    type: application
    platform: iOS
    sources:
      - NukoeviBridge
    info:
      path: NukoeviBridge/Info.plist
      properties:
        CFBundleDisplayName: Nukoevi Bridge
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: Nukoevi Bridge uses Bluetooth to connect to StackChan.
        NSBluetoothPeripheralUsageDescription: Nukoevi Bridge uses Bluetooth to connect to StackChan.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: test.NukoeviBridge
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S9E7U26GM4
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
